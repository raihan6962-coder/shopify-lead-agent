### Part B — Render Account এ যাও

**9.5** → [render.com](https://render.com) এ যাও → Login করো

**9.6** → Dashboard এ **"New +"** button → **"Web Service"** click করো

**9.7** → **"Connect a repository"** → GitHub connect করো যদি আগে না করা থাকে

**9.8** → তোমার `shopify-lead-agent` repository টা দেখাবে → **"Connect"** click করো

