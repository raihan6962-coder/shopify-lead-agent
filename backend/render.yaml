### Part C — Service Configure করো

**9.9** → এভাবে fill করো:

- **Name:** `shopify-lead-agent`
- **Region:** Singapore (Bangladesh এর কাছে)
- **Branch:** `main`
- **Root Directory:** `backend`
- **Runtime:** `Python 3`
